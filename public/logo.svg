<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" width="320" height="96" role="img" aria-label="I Trust Techno Solutions">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7CD6FF"/>
      <stop offset="50%" stop-color="#A879FF"/>
      <stop offset="100%" stop-color="#FF6EC7"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7CD6FF"/>
      <stop offset="100%" stop-color="#FF6EC7"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7CD6FF"/>
      <stop offset="100%" stop-color="#FF6EC7"/>
    </linearGradient>
  </defs>
  <!-- mark -->
  <g transform="translate(12 24)">
    <rect x="1.25" y="1.25" width="45.5" height="45.5" rx="13" fill="none" stroke="url(#ring)" stroke-width="2.5"/>
    <circle cx="24" cy="11.5" r="2.6" fill="url(#stroke)"/>
    <path d="M11 34 L24 19 L37 34" fill="none" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M15 40.5 L33 40.5" stroke="url(#stroke)" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  </g>
  <!-- wordmark -->
  <g font-family="Inter, -apple-system, Segoe UI, sans-serif">
    <text x="76" y="52" font-size="22" font-weight="800" fill="#F4F4F8" letter-spacing="-0.5">
      I Trust <tspan fill="url(#word)">Techno</tspan>
    </text>
    <text x="76" y="70" font-size="9" letter-spacing="4" fill="#9AA0B4" font-weight="600">SOLUTIONS · ITTS</text>
  </g>
